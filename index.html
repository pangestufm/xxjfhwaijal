<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validator Capaian Output Satker v7 - Premium UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f7fa; 
            --container-bg: #ffffff; 
            --text-color: #2b3445;
            --text-muted: #7d879c;
            --primary-color: #2563eb; 
            --primary-hover: #1d4ed8;
            --border-color: #e3e9ef;
            --table-header-bg: #f8fafc;
            --table-header-color: #475569;
            --error-bg: #fef2f2; 
            --error-text: #dc2626;
            --success-bg: #f0fdf4; 
            --success-text: #16a34a;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a; 
            --container-bg: #1e293b; 
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #3b82f6; 
            --primary-hover: #60a5fa;
            --border-color: #334155;
            --table-header-bg: #0f172a;
            --table-header-color: #cbd5e1;
            --error-bg: #450a0a; 
            --error-text: #fca5a5;
            --success-bg: #052e16; 
            --success-text: #86efac;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 20px 30px; 
            background-color: var(--bg-color); color: var(--text-color);
            transition: var(--transition);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        
        .theme-toggle {
            background: var(--container-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 10px 20px;
            border-radius: 50px; cursor: pointer; font-weight: 500; font-family: 'Poppins', sans-serif;
            box-shadow: var(--card-shadow); transition: var(--transition);
        }
        .theme-toggle:hover { transform: translateY(-2px); }

        .dashboard-container {
            background-color: var(--container-bg); padding: 30px; 
            border-radius: 20px; box-shadow: var(--card-shadow);
        }

        .upload-section {
            display: flex; align-items: center; gap: 20px;
            padding: 25px; border-radius: 16px; border: 2px dashed var(--border-color);
            background-color: rgba(0,0,0,0.02); margin-bottom: 30px;
            transition: var(--transition);
        }
        .upload-section:hover { border-color: var(--primary-color); }

        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-upload-wrapper input[type="file"] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .btn-upload {
            background-color: var(--container-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 12px 24px;
            border-radius: 8px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; gap: 10px; box-shadow: var(--card-shadow);
        }
        #fileNameDisplay { color: var(--text-muted); font-size: 14px; font-weight: 500;}

        .btn-process {
            background-color: var(--primary-color); color: white; border: none; 
            padding: 12px 30px; border-radius: 8px; font-weight: 600; font-family: 'Poppins', sans-serif;
            cursor: pointer; display: flex; align-items: center; gap: 10px; margin-left: auto;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39); transition: var(--transition);
        }
        .btn-process:hover { background-color: var(--primary-hover); transform: translateY(-2px); }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; display: none; }
        .stat-card {
            background: var(--container-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border-color); box-shadow: var(--card-shadow);
            display: flex; align-items: center; gap: 20px; transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .icon-blue { background-color: rgba(37, 99, 235, 0.1); color: var(--primary-color); }
        .icon-green { background-color: rgba(22, 163, 74, 0.1); color: var(--success-text); }
        .icon-red { background-color: rgba(220, 38, 38, 0.1); color: var(--error-text); }
        .stat-details h4 { margin: 0; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .stat-details h2 { margin: 5px 0 0 0; font-size: 28px; color: var(--text-color); }

        .table-wrapper {
            border-radius: 16px; border: 1px solid var(--border-color);
            max-height: 70vh; overflow: auto; position: relative; display: none;
            box-shadow: var(--card-shadow);
        }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 13px; }
        th { 
            background-color: var(--table-header-bg); color: var(--table-header-color); 
            position: sticky; top: 0; z-index: 10; padding: 16px 20px; text-align: left; 
            font-weight: 600; white-space: nowrap; backdrop-filter: blur(10px);
        }
        td { border-bottom: 1px solid var(--border-color); padding: 16px 20px; vertical-align: middle;}
        tr { transition: var(--transition); background-color: var(--container-bg); }
        tr:hover { background-color: rgba(0,0,0,0.02); }
        
        .badge { padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
        .badge-success { background-color: var(--success-bg); color: var(--success-text); border: 1px solid rgba(22, 163, 74, 0.2); }
        .badge-error { background-color: var(--error-bg); color: var(--error-text); border: 1px solid rgba(220, 38, 38, 0.2); }
        .reason-text { font-size: 12px; color: var(--text-muted); margin-top: 8px; display: block; line-height: 1.5; }
        
        .saran-pill {
            background-color: var(--bg-color); padding: 8px 15px; border-radius: 8px;
            font-size: 16px; font-weight: 700; color: var(--text-color); border: 1px solid var(--border-color);
            display: inline-block;
        }

        #loading { display: none; text-align: center; padding: 40px; color: var(--primary-color); }
        .spinner { font-size: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .table-wrapper::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: transparent; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><i class="fas fa-rocket"></i>Cepat Cek Caput (C3)</div>
    <button class="theme-toggle" id="toggleThemeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> Dark Mode
    </button>
</div>

<div class="dashboard-container">
    <div class="upload-section">
        <div class="file-upload-wrapper">
            <button class="btn-upload"><i class="fas fa-paperclip"></i> Pilih File</button>
            <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" onchange="updateFileName(this)">
        </div>
        <span id="fileNameDisplay">Belum ada file yang dipilih...</span>
        <button class="btn-process" onclick="startProcessing()"><i class="fas fa-rocket"></i> Validasi Sekarang</button>
    </div>

    <div id="loading">
        <i class="fas fa-circle-notch spinner"></i>
        <p style="margin-top: 15px; font-weight: 500;">Menganalisis Kertas Kerja...</p>
    </div>

    <div class="summary-grid" id="summaryGrid">
        <div class="stat-card">
            <div class="stat-icon icon-blue"><i class="fas fa-database"></i></div>
            <div class="stat-details">
                <h4>Total Data Diperiksa</h4>
                <h2 id="countTotal">0</h2>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-green"><i class="fas fa-check-circle"></i></div>
            <div class="stat-details">
                <h4>Data Valid</h4>
                <h2 id="countValid">0</h2>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-red"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="stat-details">
                <h4>Perlu Perbaikan</h4>
                <h2 id="countError">0</h2>
            </div>
        </div>
    </div>
    
    <div class="table-wrapper" id="result-container">
        <div id="result"></div>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.documentElement;
        const btn = document.getElementById('toggleThemeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
            localStorage.setItem('theme', 'dark');
        }
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('toggleThemeBtn').innerHTML = '<i class="fas fa-sun"></i> Light Mode';
    }

    function updateFileName(input) {
        const display = document.getElementById('fileNameDisplay');
        if (input.files && input.files.length > 0) {
            display.innerHTML = `<i class="fas fa-file-excel" style="color:var(--success-text);"></i> <b>${input.files[0].name}</b> siap divalidasi.`;
        } else {
            display.innerText = 'Belum ada file yang dipilih...';
        }
    }

    function startProcessing() {
        const fileInput = document.getElementById('excelFileInput');
        const file = fileInput.files[0];
        
        if (!file) { 
            alert('Silakan pilih file Excel/CSV terlebih dahulu!'); 
            return; 
        }

        document.getElementById('summaryGrid').style.display = 'none';
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        setTimeout(() => { processFile(file); }, 500);
    }

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            renderTable(rows);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('summaryGrid').style.display = 'grid';
            document.getElementById('result-container').style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    }

    function renderTable(rows) {
        let tableHTML = `<table>
            <thead>
                <tr>
                    <th>No</th><th>Satuan Kerja</th><th>RO</th>
                    <th>Target</th><th>Belanja (%)</th><th>RVRO</th><th>TPCRO (%)</th><th>PCRO (%)</th>
                    <th>Status Validasi</th><th style="text-align:center;">Saran Isian PCRO</th>
                </tr>
            </thead>
            <tbody>`;

        let errors = 0; let valids = 0;

        rows.forEach((row) => {
            if (row && row.length > 19) {
                let no = parseInt(row[0]);
                if (!isNaN(no) && no > 0) {
                    let L = parseFloat((parseFloat(row[11]) || 0).toFixed(2));
                    let M = parseFloat(row[12]) || 0;
                    let Q = parseFloat((parseFloat(row[16]) || 0).toFixed(2));
                    let R = parseFloat(row[17]) || 0;
                    let S = parseFloat((parseFloat(row[18]) || 0).toFixed(2));
                    let T = parseFloat((parseFloat(row[19]) || 0).toFixed(2));

                    let reasons = []; let isError = false;

                    // Logika 1, 2, & 4 gabungan
                    let base_target = Math.max(L, S);
                    
                    // MINIMAL PCRO DIUBAH JADI 0.01
                    let final_threshold = (L === 0 || S === 0) ? Math.max(base_target, 0.01) : base_target;

                    if (T < final_threshold) {
                        reasons.push(`PCRO akumulatif (${T.toFixed(2)}%) belum mencapai TARGET (${final_threshold.toFixed(2)}%)`);
                        isError = true;
                    }

                    // Logika 3 (RVRO vs Target)
                    if (R === M && T < 100) {
                        reasons.push(`RVRO akumulatif sudah sama dengan Target DIPA. PCRO wajib 100%.`);
                        isError = true;
                        final_threshold = Math.max(final_threshold, 100);
                    }

                    let saran = `<span style="color: var(--text-muted)">-</span>`;
                    let statusHTML = "";

                    if (isError) {
                        let x = T - Q; 
                        let q_seharusnya = Math.max(final_threshold - x, 0); 
                        saran = `<div class="saran-pill">${q_seharusnya.toFixed(2)}%</div>`;
                        
                        statusHTML = `<div class="badge badge-error"><i class="fas fa-times-circle"></i> Perbaikan</div>
                                      <span class="reason-text">${reasons.join('<br>• ')}</span>`;
                        errors++;
                    } else {
                        statusHTML = `<div class="badge badge-success"><i class="fas fa-check-circle"></i> Valid</div>`;
                        valids++;
                    }

                    tableHTML += `<tr style="${isError ? 'background-color: var(--error-bg);' : ''}">
                        <td><b>${no}</b></td>
                        <td style="min-width:220px; line-height:1.4;">
                            <span style="font-size:11px; color:var(--text-muted);">${row[1]}</span><br>
                            <b>${row[2]}</b>
                        </td>
                        <td style="font-weight:600; color:var(--primary-color)">${row[7]}</td>
                        <td>${M}</td>
                        <td>${L.toFixed(2)}%</td>
                        <td>${R}</td>
                        <td>${S.toFixed(2)}%</td>
                        <td><b>${T.toFixed(2)}%</b></td>
                        <td style="min-width:260px">${statusHTML}</td>
                        <td style="text-align:center">${saran}</td>
                    </tr>`;
                }
            }
        });

        tableHTML += `</tbody></table>`;
        
        document.getElementById('countTotal').innerText = valids + errors;
        document.getElementById('countValid').innerText = valids;
        document.getElementById('countError').innerText = errors;
        
        document.getElementById('result').innerHTML = tableHTML;
    }
</script>
</body>
</html>
