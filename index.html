<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analitik RPD DIPA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Variabel Warna Modern (Tema SaaS) */
        :root {
            --bg-main: #f1f5f9;
            --surface: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --success-bg: #dcfce7;
            --success-text: #166534;
            --danger-bg: #fee2e2;
            --danger-text: #991b1b;
            --info-bg: #dbeafe;
            --info-text: #1e40af;
            --warning-bg: #fef9c3;
            --warning-text: #854d0e;
            
            --wa-color: #25D366;
            --wa-hover: #1da851;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            padding: 30px 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        /* --- HEADER & TYPOGRAPHY --- */
        .header-section {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .header-icon {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }
        h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 2px;
        }

        /* --- CUSTOM UPLOAD AREA --- */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }
        .upload-area:hover {
            border-color: var(--primary);
            background-color: #f0f9ff;
        }
        .upload-icon {
            font-size: 40px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .custom-file-upload {
            display: inline-block;
            padding: 10px 24px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.3s;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        }
        .custom-file-upload:hover {
            background-color: var(--primary-hover);
        }
        input[type="file"] {
            display: none;
        }
        .file-name-display {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-dark);
            font-weight: 500;
        }

        /* --- INFO BANNER --- */
        .info-bulan {
            background-color: var(--info-bg);
            color: var(--info-text);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 14px;
            border: 1px solid #bfdbfe;
        }

        /* --- DASHBOARD CARDS --- */
        .dashboard {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .dash-card {
            padding: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .dash-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
        }
        .dash-success {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
        }
        .dash-success::before { background-color: #10b981; }
        .dash-danger {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
        }
        .dash-danger::before { background-color: #ef4444; }

        .dash-icon {
            width: 54px; height: 54px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
        }
        .icon-success { background: var(--success-bg); color: var(--success-text); }
        .icon-danger { background: var(--danger-bg); color: var(--danger-text); }

        .dash-content h3 {
            margin: 0 0 5px 0;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dash-content .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
            line-height: 1;
        }

        /* --- TABLE STYLING --- */
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            white-space: nowrap;
        }
        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }
        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        tbody tr:hover {
            background-color: #f1f5f9;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }

        /* --- BADGES (PILL STYLE) --- */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }
        .status-kurang { background-color: var(--danger-bg); color: var(--danger-text); }
        .status-lebih { background-color: var(--info-bg); color: var(--info-text); }
        .status-sesuai { background-color: var(--success-bg); color: var(--success-text); }
        
        .badge-avg { padding: 6px 12px; font-size: 12px; }
        .badge-aman { background-color: var(--success-bg); color: var(--success-text); }
        .badge-bahaya { background-color: var(--danger-bg); color: var(--danger-text); }

        /* --- BUTTONS --- */
        .btn-wa {
            background-color: var(--wa-color);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(37, 211, 102, 0.2);
        }
        .btn-wa:hover {
            background-color: var(--wa-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(37, 211, 102, 0.3);
        }
        .btn-wa.copied {
            background-color: var(--text-dark);
            box-shadow: none;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 48px;
            color: #cbd5e1;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="header-icon">
            <i class="fas fa-chart-pie"></i>
        </div>
        <div>
            <h2>Dashboard Deviasi RPD</h2>
            <div class="subtitle">Monitoring Halaman III DIPA Otomatis & Generator Pesan WA</div>
        </div>
    </div>
    
    <div class="upload-area">
        <i class="fas fa-cloud-upload-alt upload-icon"></i>
        <p style="margin: 0 0 15px 0; color: var(--text-muted); font-size: 14px;">Tarik & Letakkan file di sini, atau klik tombol di bawah</p>
        <label for="fileUpload" class="custom-file-upload">
            <i class="fas fa-folder-open" style="margin-right: 6px;"></i> Pilih File Excel / CSV
        </label>
        <input type="file" id="fileUpload" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
        <div id="fileNameDisplay" class="file-name-display"></div>
    </div>

    <div id="infoBulan" class="info-bulan">
        <i class="fas fa-calendar-alt" style="font-size: 18px;"></i>
        <span>Memuat data sistem...</span>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="dash-card dash-success">
            <div class="dash-icon icon-success">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="dash-content">
                <h3>Memenuhi Syarat (≤ 5%)</h3>
                <p class="number" id="countMemenuhi">0</p>
            </div>
        </div>
        <div class="dash-card dash-danger">
            <div class="dash-icon icon-danger">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="dash-content">
                <h3>Melebihi Batas (> 5%)</h3>
                <p class="number" id="countMelebihi">0</p>
            </div>
        </div>
    </div>

    <div id="output">
        <div class="empty-state">
            <i class="fas fa-file-invoice"></i>
            <p>Belum ada data. Silakan upload file monitoring RPD Anda.</p>
        </div>
    </div>
</div>

<script>
    const messageStore = {};

    const bulanMap = {
        "01":"Januari", "02":"Februari", "03":"Maret", "04":"April", 
        "05":"Mei", "06":"Juni", "07":"Juli", "08":"Agustus", 
        "09":"September", "10":"Oktober", "11":"November", "12":"Desember"
    };

    const dateNow = new Date();
    const currentMonthNum = dateNow.getMonth() + 1;
    const currentMonthStr = currentMonthNum.toString().padStart(2, '0');
    const namaBulanSekarang = bulanMap[currentMonthStr];

    document.getElementById('infoBulan').innerHTML = `<i class="fas fa-calendar-check" style="font-size: 18px;"></i> <span>Sistem aktif memfilter Data Periode: <strong>${currentMonthStr} (${namaBulanSekarang})</strong></span>`;

    document.getElementById('fileUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Tampilkan nama file yang diupload
        document.getElementById('fileNameDisplay').innerHTML = `<i class="fas fa-file-excel" style="color: #10b981;"></i> ${file.name}`;

        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            generateTable(rows);
        };
        reader.readAsArrayBuffer(file);
    });

    function generateTable(rows) {
        const outputDiv = document.getElementById('output');
        const dashboard = document.getElementById('dashboard');
        
        outputDiv.innerHTML = ''; 
        let countMemenuhi = 0;
        let countMelebihi = 0;

        let dataStartIndex = 2; 
        for(let i = 0; i < rows.length; i++) {
            if(rows[i][0] === "NO" || rows[i][1] === "Kode Satker") {
                dataStartIndex = i + 1;
                break;
            }
        }

        let tableHTML = `
            <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="5%" style="text-align:center;">No</th>
                        <th width="10%">Satker</th>
                        <th width="20%">Nama Instansi</th>
                        <th width="14%">Belanja 51</th>
                        <th width="14%">Belanja 52</th>
                        <th width="14%">Belanja 53</th>
                        <th width="10%" style="text-align:center;">Rata-Rata</th>
                        <th width="13%">Aksi</th>
                    </tr>
                </thead>
                <tbody>
        `;

        let totalMessages = 0;
        let nomorUrut = 1;

        for (let i = dataStartIndex; i < rows.length; i++) {
            const row = rows[i];
            
            if (!row || !row[1] || row[1].toString().trim() === "") continue; 

            const periodeDiExcel = row[5] ? row[5].toString().padStart(2, '0') : "";

            if (periodeDiExcel !== currentMonthStr) {
                continue; 
            }

            const kodeSatker = row[1];
            const namaSatker = row[2];

            const ren51 = parseFloat(row[6]) || 0;
            const ren52 = parseFloat(row[7]) || 0;
            const ren53 = parseFloat(row[8]) || 0;

            const pen51 = parseFloat(row[10]) || 0;
            const pen52 = parseFloat(row[11]) || 0;
            const pen53 = parseFloat(row[12]) || 0;

            const dev51 = parseFloat(row[14]) || 0;
            const dev52 = parseFloat(row[15]) || 0;
            const dev53 = parseFloat(row[16]) || 0;

            const pct51 = parseFloat(row[18]) || 0;
            const pct52 = parseFloat(row[19]) || 0;
            const pct53 = parseFloat(row[20]) || 0;

            let activeBelanja = 0;
            if (ren51 > 0 || pen51 > 0) activeBelanja++;
            if (ren52 > 0 || pen52 > 0) activeBelanja++;
            if (ren53 > 0 || pen53 > 0) activeBelanja++;

            let rataRataDeviasi = 0;
            if (activeBelanja > 0) {
                rataRataDeviasi = (pct51 + pct52 + pct53) / activeBelanja;
            }

            let statusRataRataClass = "";
            let statusIcon = "";
            if (rataRataDeviasi <= 5) {
                countMemenuhi++;
                statusRataRataClass = "badge-aman";
                statusIcon = '<i class="fas fa-check"></i>';
            } else {
                countMelebihi++;
                statusRataRataClass = "badge-bahaya";
                statusIcon = '<i class="fas fa-exclamation"></i>';
            }

            const getKeteranganInfo = (penyerapan, rencana) => {
                const selisih = penyerapan - rencana;
                if (selisih < 0) return { teks: "Kekurangan", class: "status-kurang" };
                if (selisih > 0) return { teks: "Kelebihan", class: "status-lebih" };
                return { teks: "Sesuai Target", class: "status-sesuai" };
            };

            const formatRupiah = (angka) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
            };

            const info51 = getKeteranganInfo(pen51, ren51);
            const info52 = getKeteranganInfo(pen52, ren52);
            const info53 = getKeteranganInfo(pen53, ren53);

            let pesan = `Yth. Bapak/Ibu Pengelola Satuan Kerja ${kodeSatker}/${namaSatker}, berikut kami sampaikan kekurangan/kelebihan belanja pada satuan kerja Bapak/Ibu,\n\n`;
            pesan += `Belanja 51 = ${formatRupiah(dev51)} (${info51.teks})\n`;
            pesan += `Belanja 52 = ${formatRupiah(dev52)} (${info52.teks})\n`;
            pesan += `Belanja 53 = ${formatRupiah(dev53)} (${info53.teks})\n\n`;
            pesan += `mohon untuk dapat segera melakukan realisasi belanja (jika minus)/menyesuaikan belanja (jika berlebih) pada periode ${currentMonthStr}/${namaBulanSekarang} ini, terima kasih\n\n`;
            pesan += `NB: Data ini ditarik pukul 09:00 WIB melalui MyIntress, untuk data lebih realtime bisa melakukan pengecekan pada FA Detail basis Kas`;
            
            const uniqueId = `satker_${i}`;
            messageStore[uniqueId] = pesan;

            tableHTML += `
                <tr>
                    <td style="text-align:center; color:var(--text-muted);">${nomorUrut}</td>
                    <td style="font-weight:700; color:var(--primary);">${kodeSatker}</td>
                    <td style="white-space: normal; line-height:1.3;">${namaSatker}</td>
                    <td>
                        <div style="font-weight:600;">${formatRupiah(dev51)}</div>
                        <span class="badge ${info51.class}">${info51.teks}</span>
                    </td>
                    <td>
                        <div style="font-weight:600;">${formatRupiah(dev52)}</div>
                        <span class="badge ${info52.class}">${info52.teks}</span>
                    </td>
                    <td>
                        <div style="font-weight:600;">${formatRupiah(dev53)}</div>
                        <span class="badge ${info53.class}">${info53.teks}</span>
                    </td>
                    <td style="text-align:center;">
                        <span class="badge badge-avg ${statusRataRataClass}">${statusIcon} ${rataRataDeviasi.toFixed(2)}%</span>
                    </td>
                    <td>
                        <button class="btn-wa" onclick="copyPesan('${uniqueId}', this)">
                            <i class="fab fa-whatsapp" style="font-size:14px;"></i> Copy WA
                        </button>
                    </td>
                </tr>
            `;
            
            totalMessages++;
            nomorUrut++;
        }

        tableHTML += `</tbody></table></div>`;

        if(totalMessages === 0) {
            dashboard.style.display = 'none';
            outputDiv.innerHTML = `
                <div class="empty-state" style="color: var(--danger-text); background: var(--danger-bg); border-radius: 8px;">
                    <i class="fas fa-folder-minus" style="color: #f87171;"></i>
                    <p>Tidak ada data ditemukan untuk periode bulan berjalan <strong>(${currentMonthStr}/${namaBulanSekarang})</strong>.</p>
                </div>`;
        } else {
            dashboard.style.display = 'grid';
            document.getElementById('countMemenuhi').innerText = countMemenuhi;
            document.getElementById('countMelebihi').innerText = countMelebihi;
            
            outputDiv.innerHTML = tableHTML;
        }
    }

    function copyPesan(uniqueId, button) {
        const textToCopy = messageStore[uniqueId];
        
        if(textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                button.innerHTML = '<i class="fas fa-check-double"></i> Tersalin!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.innerHTML = '<i class="fab fa-whatsapp" style="font-size:14px;"></i> Copy WA';
                    button.classList.remove('copied');
                }, 2500);
            }).catch(err => {
                alert('Gagal copy teks, browser mungkin tidak mengizinkan akses clipboard.');
            });
        }
    }
</script>

</body>
</html>
