<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Pesan Deviasi RPD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px; /* Diperlebar sedikit untuk kolom baru */
            margin: 0 auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .upload-section {
            margin: 20px 0;
            padding: 20px;
            background-color: #e8f4f8;
            border: 2px dashed #3498db;
            border-radius: 8px;
            text-align: center;
        }
        input[type="file"] {
            margin-top: 10px;
        }
        .info-bulan {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ffeeba;
        }

        /* --- STYLING DASHBOARD ANALITIK --- */
        .dashboard {
            display: none; /* Disembunyikan sampai ada data */
            gap: 20px;
            margin-bottom: 20px;
        }
        .dash-card {
            flex: 1;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .dash-success {
            background-color: #2ecc71; /* Hijau */
        }
        .dash-danger {
            background-color: #e74c3c; /* Merah */
        }
        .dash-card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: white;
            border-bottom: none;
            padding-bottom: 0;
        }
        .dash-card .number {
            font-size: 42px;
            font-weight: bold;
            margin: 5px 0;
        }
        
        /* --- STYLING TABEL --- */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #34495e;
            color: white;
            text-align: center;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e8f4f8;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }
        .status-kurang { background-color: #f8d7da; color: #721c24; }
        .status-lebih { background-color: #cce5ff; color: #004085; }
        .status-sesuai { background-color: #d4edda; color: #155724; }
        
        /* Badge untuk Rata-rata Deviasi */
        .badge-aman { background-color: #2ecc71; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; }
        .badge-bahaya { background-color: #e74c3c; color: white; padding: 4px 8px; border-radius: 12px; font-weight: bold; }

        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }
        .btn-wa:hover {
            background: #1ebe57;
        }
        .btn-wa.copied {
            background: #34495e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Generator Pesan Deviasi RPD Halaman III DIPA</h2>
    
    <div class="upload-section">
        <p><strong>Upload File Excel / CSV (Monitoring RPD):</strong></p>
        <input type="file" id="fileUpload" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
    </div>

    <div id="infoBulan" class="info-bulan">
        Sistem sedang memuat data periode bulan saat ini...
    </div>

    <div id="dashboard" class="dashboard">
        <div class="dash-card dash-success">
            <h3>Deviasi Rata-Rata ≤ 5% (Memenuhi Syarat)</h3>
            <p class="number" id="countMemenuhi">0</p>
            <p>Satuan Kerja</p>
        </div>
        <div class="dash-card dash-danger">
            <h3>Deviasi Rata-Rata > 5% (Melebihi Syarat)</h3>
            <p class="number" id="countMelebihi">0</p>
            <p>Satuan Kerja</p>
        </div>
    </div>

    <div id="output" class="table-container">
        </div>
</div>

<script>
    const messageStore = {};

    const bulanMap = {
        "01":"Januari", "02":"Februari", "03":"Maret", "04":"April", 
        "05":"Mei", "06":"Juni", "07":"Juli", "08":"Agustus", 
        "09":"September", "10":"Oktober", "11":"November", "12":"Desember"
    };

    const dateNow = new Date();
    const currentMonthNum = dateNow.getMonth() + 1;
    const currentMonthStr = currentMonthNum.toString().padStart(2, '0');
    const namaBulanSekarang = bulanMap[currentMonthStr];

    document.getElementById('infoBulan').innerText = `Otomatis memfilter Data Periode: ${currentMonthStr} (${namaBulanSekarang})`;

    document.getElementById('fileUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            generateTable(rows);
        };
        reader.readAsArrayBuffer(file);
    });

    function generateTable(rows) {
        const outputDiv = document.getElementById('output');
        const dashboard = document.getElementById('dashboard');
        
        outputDiv.innerHTML = ''; 
        let countMemenuhi = 0;
        let countMelebihi = 0;

        let dataStartIndex = 2; 
        for(let i = 0; i < rows.length; i++) {
            if(rows[i][0] === "NO" || rows[i][1] === "Kode Satker") {
                dataStartIndex = i + 1;
                break;
            }
        }

        let tableHTML = `
            <table>
                <thead>
                    <tr>
                        <th width="5%">No</th>
                        <th width="10%">Kode Satker</th>
                        <th width="20%">Nama Satker</th>
                        <th width="13%">Deviasi 51</th>
                        <th width="13%">Deviasi 52</th>
                        <th width="13%">Deviasi 53</th>
                        <th width="11%">Rata-Rata Deviasi</th>
                        <th width="15%">Aksi</th>
                    </tr>
                </thead>
                <tbody>
        `;

        let totalMessages = 0;
        let nomorUrut = 1;

        for (let i = dataStartIndex; i < rows.length; i++) {
            const row = rows[i];
            
            if (!row || !row[1] || row[1].toString().trim() === "") continue; 

            const periodeDiExcel = row[5] ? row[5].toString().padStart(2, '0') : "";

            if (periodeDiExcel !== currentMonthStr) {
                continue; 
            }

            const kodeSatker = row[1];
            const namaSatker = row[2];

            const ren51 = parseFloat(row[6]) || 0;
            const ren52 = parseFloat(row[7]) || 0;
            const ren53 = parseFloat(row[8]) || 0;

            const pen51 = parseFloat(row[10]) || 0;
            const pen52 = parseFloat(row[11]) || 0;
            const pen53 = parseFloat(row[12]) || 0;

            const dev51 = parseFloat(row[14]) || 0;
            const dev52 = parseFloat(row[15]) || 0;
            const dev53 = parseFloat(row[16]) || 0;

            // Mengambil Nilai % Deviasi dari Excel (Indeks 18, 19, 20)
            const pct51 = parseFloat(row[18]) || 0;
            const pct52 = parseFloat(row[19]) || 0;
            const pct53 = parseFloat(row[20]) || 0;

            // Hitung rata-rata deviasi hanya untuk belanja yang ada pagu/penyerapannya (Aktif)
            let activeBelanja = 0;
            if (ren51 > 0 || pen51 > 0) activeBelanja++;
            if (ren52 > 0 || pen52 > 0) activeBelanja++;
            if (ren53 > 0 || pen53 > 0) activeBelanja++;

            let rataRataDeviasi = 0;
            if (activeBelanja > 0) {
                rataRataDeviasi = (pct51 + pct52 + pct53) / activeBelanja;
            }

            // Hitung Satker Memenuhi atau Melebihi Syarat Deviasi (<= 5%)
            let statusRataRataClass = "";
            if (rataRataDeviasi <= 5) {
                countMemenuhi++;
                statusRataRataClass = "badge-aman";
            } else {
                countMelebihi++;
                statusRataRataClass = "badge-bahaya";
            }

            const getKeteranganInfo = (penyerapan, rencana) => {
                const selisih = penyerapan - rencana;
                if (selisih < 0) return { teks: "Kekurangan Belanja", class: "status-kurang" };
                if (selisih > 0) return { teks: "Kelebihan Belanja", class: "status-lebih" };
                return { teks: "Sesuai Target", class: "status-sesuai" };
            };

            const formatRupiah = (angka) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
            };

            const info51 = getKeteranganInfo(pen51, ren51);
            const info52 = getKeteranganInfo(pen52, ren52);
            const info53 = getKeteranganInfo(pen53, ren53);

            let pesan = `Yth. Bapak/Ibu Pengelola Satuan Kerja ${kodeSatker}/${namaSatker}, berikut kami sampaikan kekurangan/kelebihan belanja pada satuan kerja Bapak/Ibu,\n\n`;
            pesan += `Belanja 51 = ${formatRupiah(dev51)} (${info51.teks})\n`;
            pesan += `Belanja 52 = ${formatRupiah(dev52)} (${info52.teks})\n`;
            pesan += `Belanja 53 = ${formatRupiah(dev53)} (${info53.teks})\n\n`;
            pesan += `mohon untuk dapat segera melakukan realisasi belanja (jika minus)/menyesuaikan belanja (jika berlebih) pada periode ${currentMonthStr}/${namaBulanSekarang} ini, terima kasih\n\n`;
            pesan += `NB: Data ini ditarik pukul 09:00 WIB melalui MyIntress, untuk data lebih realtime bisa melakukan pengecekan pada FA Detail basis Kas`;

            const uniqueId = `satker_${i}`;
            messageStore[uniqueId] = pesan;

            tableHTML += `
                <tr>
                    <td style="text-align:center;">${nomorUrut}</td>
                    <td style="text-align:center; font-weight:bold;">${kodeSatker}</td>
                    <td>${namaSatker}</td>
                    <td>${formatRupiah(dev51)}<br><span class="status-badge ${info51.class}">${info51.teks}</span></td>
                    <td>${formatRupiah(dev52)}<br><span class="status-badge ${info52.class}">${info52.teks}</span></td>
                    <td>${formatRupiah(dev53)}<br><span class="status-badge ${info53.class}">${info53.teks}</span></td>
                    <td style="text-align:center;">
                        <span class="${statusRataRataClass}">${rataRataDeviasi.toFixed(2)}%</span>
                    </td>
                    <td>
                        <button class="btn-wa" onclick="copyPesan('${uniqueId}', this)">
                            <span>📋</span> Copy Pesan WA
                        </button>
                    </td>
                </tr>
            `;
            
            totalMessages++;
            nomorUrut++;
        }

        tableHTML += `</tbody></table>`;

        if(totalMessages === 0) {
            dashboard.style.display = 'none';
            outputDiv.innerHTML = `<p style="color:red; text-align:center; padding: 20px; border: 1px solid red; border-radius: 5px;">Tidak ada data ditemukan untuk periode bulan berjalan (${currentMonthStr}/${namaBulanSekarang}).</p>`;
        } else {
            // Tampilkan dashboard dan update angka
            dashboard.style.display = 'flex';
            document.getElementById('countMemenuhi').innerText = countMemenuhi;
            document.getElementById('countMelebihi').innerText = countMelebihi;
            
            outputDiv.innerHTML = tableHTML;
        }
    }

    function copyPesan(uniqueId, button) {
        const textToCopy = messageStore[uniqueId];
        
        if(textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                button.innerHTML = '<span>✔️</span> Tercopy!';
                button.classList.add('copied');
                
                setTimeout(() => {
                    button.innerHTML = '<span>📋</span> Copy Pesan WA';
                    button.classList.remove('copied');
                }, 2500);
            }).catch(err => {
                alert('Gagal copy teks, browser mungkin tidak mengizinkan akses clipboard.');
            });
        }
    }
</script>

</body>
</html>
